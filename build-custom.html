<!DOCTYPE html>
<html>
<head>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&family=Inter:wght@300;400;500&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#0a0a0f;color:#fff;overflow-x:hidden;}
:root{
  --cyan:#00f0ff;--magenta:#ff00ff;--blue:#4d4dff;
  --bg1:#0a0a0f;--bg2:#12121a;--bg3:#1a1a25;
  --text2:#a0a0b0;--text3:#606070;
}

/* NAVBAR */
nav{position:sticky;top:0;z-index:100;padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;background:rgba(10,10,15,0.95);border-bottom:1px solid rgba(0,240,255,0.12);backdrop-filter:blur(10px);}
.logo{display:flex;align-items:baseline;gap:2px;}
.logo-rig{font-family:'Orbitron',monospace;font-size:1.2rem;font-weight:900;background:linear-gradient(135deg,#00f0ff,#ff00ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.logo-storm{font-family:'Orbitron',monospace;font-size:1.2rem;font-weight:900;color:#a0a0b0;}
.logo-labs{font-family:'Rajdhani',sans-serif;font-size:0.75rem;letter-spacing:0.4em;color:#606070;margin-left:6px;align-self:center;}
.nav-links{display:flex;gap:2rem;list-style:none;}
.nav-links a{color:#a0a0b0;text-decoration:none;font-size:0.875rem;letter-spacing:0.05em;transition:color 0.2s;cursor:pointer;}
.nav-links a:hover{color:#00f0ff;}

/* CONTAINER */
.container{max-width:700px;margin:3rem auto;padding:2rem;}
.page-title{font-family:'Orbitron',monospace;font-size:2rem;font-weight:900;margin-bottom:2rem;background:linear-gradient(135deg,#00f0ff,#ff00ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;}
.form-card{background:rgba(20,20,30,0.8);border:1px solid rgba(0,240,255,0.2);padding:2rem;border-radius:8px;}
.form-group{margin-bottom:1.5rem;}
.form-group label{display:block;margin-bottom:0.5rem;font-family:'Rajdhani',sans-serif;font-weight:600;font-size:0.9rem;letter-spacing:0.05em;color:#00f0ff;}
.form-group input,.form-group textarea{width:100%;padding:0.75rem;background:rgba(10,10,15,0.8);border:1px solid rgba(0,240,255,0.2);color:#fff;font-family:'Inter',sans-serif;font-size:0.9rem;transition:border-color 0.3s;border-radius:4px;}
.form-group input:focus,.form-group textarea:focus{outline:none;border-color:#00f0ff;box-shadow:0 0 10px rgba(0,240,255,0.3);}
.form-group textarea{resize:vertical;min-height:150px;}
.submit-btn{width:100%;padding:1rem;background:linear-gradient(135deg,#00f0ff,#4d4dff);color:#000;font-family:'Orbitron',monospace;font-weight:700;font-size:0.9rem;letter-spacing:0.1em;cursor:pointer;border:none;border-radius:4px;transition:transform 0.3s;margin-top:1rem;}
.submit-btn:hover{transform:scale(1.02);}
.submit-btn:disabled{opacity:0.6;cursor:not-allowed;}

/* MESSAGE */
.message{padding:1rem;border-radius:4px;margin-bottom:1.5rem;text-align:center;font-weight:600;display:none;}
.message.success{background:rgba(0,240,255,0.1);border:1px solid #00f0ff;color:#00f0ff;}
.message.error{background:rgba(255,0,0,0.1);border:1px solid #ff0000;color:#ff6b6b;}
.message.show{display:block;}

/* FOOTER */
footer{background:#060609;border-top:1px solid rgba(0,240,255,0.1);padding:3rem 2rem 1.5rem;margin-top:5rem;}
.footer-inner{max-width:1200px;margin:0 auto;}
.footer-bottom{border-top:1px solid rgba(255,255,255,0.05);padding-top:1.5rem;text-align:center;}
.footer-bottom p{font-size:0.75rem;color:#606070;}
</style>

<nav>
  <div class="logo">
    <span class="logo-rig">RIG</span><span class="logo-storm">STORM</span>
    <span class="logo-labs">LABS</span>
  </div>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="pre-builts.html">Pre-Builts</a></li>
  </ul>
</nav>

<div class="container">
  <h1 class="page-title">BUILD YOUR CUSTOM PC</h1>
  
  <div class="form-card">
    <div id="message" class="message"></div>
    
    <form id="buildForm" action="https://formspree.io/f/xjgjjnqq" method="POST">
      <div class="form-group">
        <label for="name">Name *</label>
        <input type="text" id="name" name="name" required placeholder="Enter your full name">
      </div>

      <div class="form-group">
        <label for="phone">Phone *</label>
        <input type="tel" id="phone" name="phone" required placeholder="Enter your phone number">
      </div>

      <div class="form-group">
        <label for="email">Email *</label>
        <input type="email" id="email" name="email" required placeholder="Enter your email address">
      </div>

      <div class="form-group">
        <label for="address">Address *</label>
        <textarea id="address" name="address" required placeholder="Enter your complete address"></textarea>
      </div>

      <div class="form-group">
        <label for="build_requirements">Build Requirements *</label>
        <textarea id="build_requirements" name="build_requirements" required placeholder="Describe your build requirements, preferred components, gaming preferences, etc."></textarea>
      </div>

      <div class="form-group">
        <label for="budget">Budget *</label>
        <input type="number" id="budget" name="budget" required placeholder="Enter your budget in rupees">
      </div>

      <button type="submit" class="submit-btn">Build Now</button>
    </form>
  </div>
</div>

<footer>
  <div class="footer-inner">
    <div class="footer-bottom">
      <p>© 2026 Rigstorm Labs. All rights reserved.</p>
    </div>
  </div>
</footer>

<script>
document.getElementById('buildForm').addEventListener('submit', function(e) {
  const messageDiv = document.getElementById('message');
  
  // Show loading state
  const submitBtn = this.querySelector('.submit-btn');
  const originalText = submitBtn.textContent;
  submitBtn.textContent = 'SENDING...';
  submitBtn.disabled = true;
  
  // Formspree will handle the submission
  // Show success message after brief delay
  setTimeout(() => {
    messageDiv.textContent = 'RigStorm Labs has received your request — we\'ll contact you soon!';
    messageDiv.className = 'message success show';
    
    // Reset form
    this.reset();
    submitBtn.textContent = originalText;
    submitBtn.disabled = false;
    
    // Hide message after 5 seconds
    setTimeout(() => {
      messageDiv.className = 'message';
    }, 5000);
  }, 1000);
});
</script>
